<script>const findMorphMarker = (marker) => {
    if (marker.startsWith('<!--') && marker.endsWith('-->')) {
        const text = marker.slice(4, -3).trim();
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_COMMENT);
        let node;
        while ((node = walker.nextNode())) {
            if (node.nodeValue && node.nodeValue.trim() === text) return node;
        }
        return null;
    }
    return document.querySelector(marker);
};
document.querySelector('#btn').addEventListener('click', async () => {
    Alpine.morphBetween(findMorphMarker('<!--start-->'), findMorphMarker('<!--end-->'), `<li>new</li>`, { updating(el, toEl, childrenOnly, skip) { console.log('u') }, updated(el, toEl) { console.log('d') }, removing(el, skip) { console.log('r') }, removed(el) { console.log('rm') }, adding(el, skip) { console.log('a') }, added(el) { console.log('ad') }, key: (el) => el.id, lookahead: true })
})</script>
